<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>인피니티 프리다이빙</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;
        const { Calendar, Users, Image: ImageIcon, Bell, Plus, Download, Share2, MapPin, Clock, Check, ChevronRight, MessageSquare } = lucide;

        // [Mock Data]
        const INITIAL_SCHEDULES = [
            { id: 1, date: '2026-07-10', time: '14:00 - 17:00', type: '풀장 교육 (Level 1)', location: '성남 종합운동장 다이빙풀', current: 2, max: 4 },
            { id: 2, date: '2026-07-11', time: '09:00 - 12:00', type: '이론 수업', location: '강남역 스터디룸', current: 5, max: 8 },
            { id: 3, date: '2026-07-15', time: '10:00 - 16:00', type: '프리다이빙 투어', location: '강원도 고성', current: 4, max: 4 },
            { id: 4, date: '2026-07-18', time: '18:00 - 21:00', type: '풀장 트레이닝', location: '올림픽수영장 다이빙풀', current: 1, max: 6 },
        ];

        const MOCK_NOTICES = [
            { id: 1, title: '🤿 AIDA Level 1, 2 자격증 발급 절차 안내', date: '2026.07.01', isImportant: true },
            { id: 2, title: '수도권 다이빙풀장 이용 수칙 및 입장료 정리', date: '2026.06.28', isImportant: false },
        ];

        const MOCK_PHOTOS = [
            { id: 1, url: 'https://images.unsplash.com/photo-1544551763-46a013bb70d5?auto=format&fit=crop&q=80&w=800', title: '세부 투어 단체사진' },
            { id: 2, url: 'https://images.unsplash.com/photo-1551698618-1dfe5d97d256?auto=format&fit=crop&q=80&w=800', title: '고성 해양실습' },
        ];

        function App() {
            const [role, setRole] = useState('student');
            const [activeTab, setActiveTab] = useState('schedule');
            const [schedules, setSchedules] = useState(INITIAL_SCHEDULES);
            const [toastMessage, setToastMessage] = useState(null);

            const showToast = (message) => {
                setToastMessage(message);
                setTimeout(() => setToastMessage(null), 3000);
            };

            const handleApply = useCallback((schedule) => {
                if (schedule.current >= schedule.max) return;
                setSchedules(prev => prev.map(s => s.id === schedule.id ? { ...s, current: s.current + 1 } : s));
                showToast(`✅ ${schedule.type} 신청 완료!`);
            }, []);

            return (
                <div className="min-h-screen pb-20">
                    {toastMessage && (
                        <div className="fixed top-4 left-1/2 -translate-x-1/2 z-50 bg-teal-600 text-white px-6 py-3 rounded-full shadow-lg">
                            {toastMessage}
                        </div>
                    )}
                    
                    <header className="bg-white shadow-sm sticky top-0 z-40 p-4 flex justify-between items-center">
                        <h1 className="font-bold text-xl text-teal-600">인피니티 프리다이빙</h1>
                        <button onClick={() => setRole(role === 'instructor' ? 'student' : 'instructor')} className="px-3 py-1 rounded-full bg-slate-100 text-xs">
                            {role === 'instructor' ? '👨‍🏫 강사 모드' : '🤿 교육생 모드'}
                        </button>
                    </header>

                    <main className="max-w-4xl mx-auto p-4">
                        {activeTab === 'schedule' && (
                            <div className="space-y-4">
                                {schedules.map(s => (
                                    <div key={s.id} className="bg-white p-5 rounded-2xl shadow-sm border border-slate-100">
                                        <h3 className="font-bold">{s.location}</h3>
                                        <p className="text-sm text-slate-500">{s.date} | {s.time}</p>
                                        <button 
                                            onClick={() => handleApply(s)}
                                            disabled={s.current >= s.max}
                                            className={`mt-3 w-full py-2 rounded-xl ${s.current >= s.max ? 'bg-slate-200' : 'bg-teal-600 text-white'}`}
                                        >
                                            {s.current >= s.max ? '마감' : '신청하기'}
                                        </button>
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>

                    <nav className="fixed bottom-0 w-full bg-white border-t flex justify-around p-4">
                        <button onClick={() => setActiveTab('schedule')}>일정</button>
                        <button onClick={() => setActiveTab('community')}>커뮤니티</button>
                        <button onClick={() => setActiveTab('gallery')}>사진</button>
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
